version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: startupx-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: startupx-nft
    volumes:
      - mongodb_data:/data/db
    networks:
      - startupx-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: startupx-backend
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/startupx-nft?authSource=admin
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-0x0000000000000000000000000000000000000000}
      NETWORK: ${NETWORK:-sepolia}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - startupx-network
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3001
    container_name: startupx-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - startupx-network
    environment:
      REACT_APP_API_URL: http://localhost:3001

volumes:
  mongodb_data:

networks:
  startupx-network:
    driver: bridge
